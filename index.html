<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Image Tracking (Fit Texture Mode)</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { 
        margin: 0; 
        overflow: hidden; 
      }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes; uiError: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video.mp4" response-type="arraybuffer" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <a-video src="#ar-video" width="1" height="1" position="0 0 0" rotation="0 0 0" material="fitTexture: true"></a-video>
      </a-entity>

    </a-scene>

    <script>
      const targetEntity = document.querySelector('#target-entity');
      const video = document.querySelector('#ar-video');
      const arVideoElement = document.querySelector('a-video');

      // ตรวจวัดขนาดจากไฟล์รูปภาพจริงในโฟลเดอร์โดยตรงเพื่อความแม่นยำ
      const img = new Image();
      
      // ⚠️ อย่าลืมเปลี่ยนชื่อตรงนี้ให้ตรงกับชื่อและนามสกุลไฟล์รูปภาพจริงในโฟลเดอร์ของคุณนะครับ
      img.src = './photo.jpg'; 

      let aspectRatio = 1;

      img.onload = function() {
        // คำนวณหาอัตราส่วนสี่เหลี่ยมของรูปภาพต้นฉบับ
        aspectRatio = this.naturalHeight / this.naturalWidth;
      };

      // ทำงานเมื่อกล้องส่องเจอรูปภาพ
      targetEntity.addEventListener("targetFound", event => {
        console.log("พบรูปภาพ -> เล่นวิดีโอ");
        video.play(); 

        // สั่งให้กล่องวิดีโอกางความกว้างและความสูงเท่ากับสัดส่วนของรูปภาพจริง
        arVideoElement.setAttribute('width', '1');
        arVideoElement.setAttribute('height', aspectRatio.toString());
      });

      // ทำงานเมื่อรูปภาพหลุดออกไปจากหน้าจอ
      targetEntity.addEventListener("targetLost", event => {
        console.log("รูปภาพหายไป -> หยุดวิดีโอ");
        video.pause(); 
      });
    </script>

  </body>
</html>
